name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  quality:
    name: Typecheck & Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck (server)
        run: npx tsc --noEmit -p packages/server/tsconfig.json

      - name: Typecheck (web)
        run: npx tsc --noEmit -p packages/web/tsconfig.json

      - name: Build (web)
        run: npm run build -w packages/web

      - name: Build (server)
        run: npm run build -w packages/server

  test:
    name: Tests
    needs: quality
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run server tests
        run: npm test -w packages/server
        env:
          MONGODB_URI: mongodb://localhost:27017/lecture-tracker-test

      - name: Run web tests
        run: npm test -w packages/web
